<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Owed - KoomiPay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="form-container">
        <h1 class="form-title">Money owed</h1>
        <div class="pending-badge-row">⏳ this won't count in your balance yet</div>

        <section class="form-card">

            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="pending-amount-input" placeholder="0.00">
            </div>

            <div class="input-group">
                <label>Who owes you</label>
                <select id="pending-person">
                    <option value="Mama">Mama</option>
                    <option value="Papa">Papa</option>
                    <option value="Hermano/a">Hermano/a</option>
                    <option value="Amigo/a">Amigo/a</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="input-group">
                <label>Details</label>
                <input type="text" id="pending-details" placeholder="what is it for">
            </div>

        </section>

        <section class="form-buttons">
            <button class="add-btn pending-btn" onclick="savePending()">add</button>
            <button class="cancel-btn" onclick="navigateTo('home.html')">cancel</button>
        </section>
    </main>
    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
