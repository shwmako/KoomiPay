<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - KoomiPay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="form-container">
        <h1 class="form-title">
            Add expense
        </h1>
        <img src="img/expensescreen.png" alt="Expense" class="form-image">

        <section class="form-card">
            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="expense-amount" placeholder="0.00">
            </div>

            <div class="input-group">
                <label>Category</label>
                <select id="expense-category">
                    <option value="Food">
                        Food
                    </option>
                    <option value="Games">
                        Games
                    </option>
                    <option value="Shopping">
                        Shopping
                    </option>
                    <option value="Bills">
                        Bills
                    </option>
                    <option value="Other">
                        Other
                    </option>
                </select>
            </div>

            <div class="input-group">
                <label>Details</label>
                <input type="text" id="expense-details" placeholder="expense details">
            </div>
        </section>

        <section class="form-buttons">
            <button class="add-btn expense-btn" onclick="saveExpense()">
                add
            </button>
            <button class="cancel-btn" onclick="navigateTo('home.html')">
                cancel
            </button>
        </section>
    </main>
    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
